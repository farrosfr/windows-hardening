<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: system-ui, sans-serif; width: 320px; padding: 15px; background: #fafafa; color: #111; margin: 0; }
    h2 { font-size: 16px; margin-top: 0; border-bottom: 1px solid #e5e5e5; padding-bottom: 10px; }
    label { display: block; margin-top: 12px; font-size: 12px; font-weight: 600; color: #444; }
    textarea, input[type="url"], input[type="text"] { width: 100%; box-sizing: border-box; margin-top: 6px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: monospace; font-size: 12px; }
    button { margin-top: 16px; width: 100%; padding: 10px; background: #0f172a; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
    button:hover { background: #334155; }
    button:disabled { background: #94a3b8; cursor: not-allowed; }
    .success { color: #16a34a; font-size: 12px; display: none; margin-top: 10px; text-align: center; font-weight: bold; }
    
    /* Lock Zone Styles */
    .lock-zone { margin-top: 20px; padding: 10px; background: #fee2e2; border: 1px solid #f87171; border-radius: 4px; }
    .challenge-text { font-family: monospace; font-weight: bold; font-size: 15px; background: #fff; padding: 8px; text-align: center; margin: 10px 0; letter-spacing: 2px; user-select: none; border: 1px dashed #ef4444;}
    #lockToggleBtn.unlock-mode { background: #dc2626; }
    #lockToggleBtn.unlock-mode:hover { background: #b91c1c; }
    
    /* Footer Styles */
    .footer { margin-top: 20px; text-align: center; font-size: 11px; color: #888; border-top: 1px solid #e5e5e5; padding-top: 10px; }
    .footer a { color: #0f172a; text-decoration: none; font-weight: bold; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>NoA Blocker Configuration</h2>

  <div id="settings-zone">
    <label for="keywords">Blocked Keywords (comma separated)</label>
    <textarea id="keywords" rows="3" placeholder="lk21, indoxxi..."></textarea>

    <label for="domains">Excluded Domains (comma separated)</label>
    <textarea id="domains" rows="2" placeholder="farrosfr.com, google.com..."></textarea>

    <label for="redirect">Redirect Target URL</label>
    <input type="url" id="redirect" placeholder="https://youtube.com/...">

    <button id="saveBtn">Save Settings</button>
    <div id="status" class="success">Settings saved successfully!</div>
  </div>

  <div class="lock-zone">
    <label id="lockLabel" style="margin-top:0; color:#991b1b;">Settings Lock</label>
    
    <div id="unlockArea" style="display:none;">
      <p style="font-size:11px; color:#991b1b; margin: 5px 0;">To unlock, manually type this exact text (no copy/paste):</p>
      <div class="challenge-text" id="challengeStr" oncopy="return false" oncut="return false"></div>
      <input type="text" id="unlockInput" placeholder="Type here to unlock..." autocomplete="off">
    </div>
    
    <button id="lockToggleBtn">Lock Settings</button>
  </div>

  <div style="margin-top: 15px;">
    <button id="guideBtn" style="background: #020617; border: 1px solid #1e293b;">Maximize Guard Strategy</button>
  </div>

  <div class="footer">
    by <a href="https://farrosfr.com" target="_blank" rel="noopener noreferrer">Farros FR</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
